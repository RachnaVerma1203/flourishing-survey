<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survey QR Code Generator</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 560px;
    margin: 40px auto; padding: 0 20px; color: #1f2733; }
  h1 { font-size: 1.3rem; }
  input { width: 100%; padding: 12px 14px; font-size: 1rem; border: 2px solid #e2e7ef;
    border-radius: 10px; box-sizing: border-box; }
  button { margin-top: 14px; padding: 12px 22px; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 10px; background: #2f6df0; color: #fff; cursor: pointer; }
  #out { margin-top: 28px; text-align: center; }
  #out img { border: 1px solid #e2e7ef; border-radius: 12px; padding: 12px; background:#fff; }
  a.dl { display:inline-block; margin-top: 12px; color:#2356c8; }
  p.note { color:#8a94a3; font-size:.85rem; }
</style>
</head>
<body>
  <h1>Survey QR Code Generator</h1>
  <p class="note">Paste your published survey URL (e.g. https://your-survey.netlify.app) and generate a printable QR code.</p>
  <input id="url" type="url" placeholder="https://your-survey.netlify.app" />
  <button onclick="gen()">Generate QR code</button>
  <div id="out"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function gen(){
  var url = document.getElementById('url').value.trim();
  var out = document.getElementById('out');
  out.innerHTML = '';
  if(!/^https?:\/\//.test(url)){ out.textContent = 'Please enter a full URL starting with https://'; return; }
  var holder = document.createElement('div');
  out.appendChild(holder);
  new QRCode(holder, { text: url, width: 320, height: 320, correctLevel: QRCode.CorrectLevel.M });
  setTimeout(function(){
    var img = holder.querySelector('img') || holder.querySelector('canvas');
    if(img){
      var src = img.tagName === 'IMG' ? img.src : img.toDataURL('image/png');
      var a = document.createElement('a');
      a.className = 'dl'; a.href = src; a.download = 'survey-qr.png'; a.textContent = 'Download PNG';
      out.appendChild(document.createElement('br'));
      out.appendChild(a);
    }
  }, 250);
}
</script>
</body>
</html>
